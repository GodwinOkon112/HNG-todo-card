<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo card - HNG stage-0</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <section class="todo__container" data-testid="test-todo-card">
      <div class="todo__top">
        <span data-testid="test-todo-priority" aria-label="Priority: High" style="color:hsl(0, 78%, 62%);">
         High
        </span>

        <ul data-testid="test-todo-tags" role="list">
          <li data-testid="test-todo-tag-work" class="work">Work</li>
        </ul>
      </div>

      <div class="todo__textBox">
        <!-- Title -->
        <h2 data-testid="test-todo-title">Finish UI Assignment</h2>

        <!-- Description -->
        <p data-testid="test-todo-description">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Est, nulla officia...
      </div>
      <div class="todo__dates">
        <!-- Due Date -->
        <time data-testid="test-todo-due-date" datetime="2026-04-15T18:00:00">
          Due April 15, 2026
        </time>

        <!-- Time Remaining -->
        <time data-testid="test-todo-time-remaining" class="due" aria-live="polite">
         
        </time>
      </div>

      <div class="todo__status">
        <!-- Status -->
        <span data-testid="test-todo-status" aria-label="Status: Pending" id="status">
          Pending
        </span>

        <!-- Checkbox -->
        <div>
          <input
            type="checkbox"
            id="todo-complete"
            data-testid="test-todo-complete-toggle"
          />
          <label for="todo-complete">Mark task as complete</label>
        </div>
      </div>


      <div class="todo__buttons">
        <!-- Edit Button -->
        <button
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          id="editBtn"
        >
          Edit
        </button>

        <!-- Delete Button -->
        <button
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          id="deleteBtn"
        >
          Delete
        </button>
      </div>
    </main>
  </body>
</html>
